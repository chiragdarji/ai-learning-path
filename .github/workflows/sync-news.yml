name: Sync News Highlights

on:
  schedule:
    - cron: '0 10 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run sync:news
      - run: npm run merge:news

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: sync AI news highlights from awesome-ai-news'
          title: 'Sync AI news highlights'
          body: |
            Automated monthly update from [awesome-ai-news](https://github.com/GetStream/awesome-ai-news).

            **Review before merge:**
            - Theme → phase mappings in `recentHighlights`
            - Learning action text for each headline
          branch: chore/news-sync
          delete-branch: true
          labels: |
            content
            news-sync
