name: Link Check

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run validate:content
      - run: npm run check:links
        continue-on-error: true
        id: links

      - name: Open issue on link failures
        if: steps.links.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Weekly link check failed'
            const body = [
              'The scheduled link checker found broken resource URLs.',
              '',
              'Run locally: `npm run check:links`',
              '',
              `Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n')
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'link-check',
            })
            if (issues.some((i) => i.title === title)) {
              core.info('Open link-check issue already exists')
              return
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['link-check'],
            })
