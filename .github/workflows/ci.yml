name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run validate:content
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
